<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Listado de propiedades en Nicaragua - INMO NICARAGUA." />
  <title>INMO NICARAGUA | Propiedades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a class="brand" href="index.html">INMO <span>NICARAGUA</span></a>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>
      <nav id="mainNav" class="site-nav">
        <a href="index.html">Inicio</a>
        <a href="propiedades.html" class="active">Propiedades</a>
        <a href="mapa.html">Mapa</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="agentes.html">Agentes</a>
        <a href="quieres-vender.html">¿Quieres vender?</a>
        <a href="contacto.html">Contacto</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Activar modo oscuro" type="button">🌙</button>
    </div>
  </header>

  <main>
    <section class="page-banner">
      <div class="container">
        <h1>Catálogo de propiedades</h1>
        <p>Filtra por ubicación, tipo y presupuesto para encontrar tu próxima inversión.</p>
      </div>
    </section>

    <section class="section section-properties container">
      <p id="agentFilterBanner" class="agent-filter-banner hidden"></p>

      <form id="filterForm" class="filter-grid">
        <input type="text" id="filterLocation" placeholder="Ubicación" />
        <select id="filterType">
          <option value="">Tipo de propiedad</option>
          <option value="Casa">Casa</option>
          <option value="Apartamento">Apartamento</option>
          <option value="Terreno">Terreno</option>
          <option value="Finca">Finca</option>
        </select>
        <select id="filterBudget">
          <option value="">Presupuesto máximo</option>
          <option value="150000">Hasta $150,000</option>
          <option value="300000">Hasta $300,000</option>
          <option value="500000">Hasta $500,000</option>
          <option value="1000000">Hasta $1,000,000</option>
        </select>
        <button type="submit">Aplicar filtros</button>
      </form>

      <div id="propertiesGrid" class="properties-grid"></div>
      <p id="emptyState" class="empty-state hidden">No se encontraron propiedades con esos criterios.</p>
    </section>
  </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-client.js"></script>
  <script src="js/main.js"></script>
  <script src="js/properties.js"></script>
</body>
</html>
