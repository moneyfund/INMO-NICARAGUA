<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INMO Nicaragua</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>INMO Nicaragua</h1>
      <p>GitHub Pages compatible static site with text-only source files.</p>
    </header>

    <main>
      <section>
        <h2>Status</h2>
        <p id="status-message">Loading site status…</p>
      </section>

      <section>
        <h2>Assets path policy</h2>
        <p>
          Place any required images under
          <code>/assets/images</code> and reference them using
          <code>/assets/images/&lt;file-name&gt;</code>.
        </p>
      </section>
    </main>

    <script src="./assets/js/main.js"></script>
  </body>
</html>
