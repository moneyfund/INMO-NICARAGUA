<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contacta a INMO NICARAGUA para asesoría inmobiliaria." />
  <title>INMO NICARAGUA | Contacto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a class="brand" href="index.html">INMO <span>NICARAGUA</span></a>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>
      <nav id="mainNav" class="site-nav">
        <a href="index.html">Inicio</a>
        <a href="propiedades.html">Propiedades</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="contacto.html" class="active">Contacto</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-banner">
      <div class="container">
        <h1>Hablemos de tu próxima propiedad</h1>
        <p>Recibe asesoría personalizada de nuestro equipo experto.</p>
      </div>
    </section>

    <section class="section container">
      <form class="contact-form" id="contactForm">
        <div class="form-row">
          <label for="nombre">Nombre</label>
          <input id="nombre" name="nombre" type="text" required />
        </div>
        <div class="form-row">
          <label for="email">Correo electrónico</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="form-row">
          <label for="telefono">Teléfono</label>
          <input id="telefono" name="telefono" type="tel" required />
        </div>
        <div class="form-row">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="6" required></textarea>
        </div>
        <button type="submit">Enviar consulta</button>
        <p id="formMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>© <span id="currentYear"></span> INMO NICARAGUA. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
