<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INMO NICARAGUA | Propiedades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="index.html">INMO <span>NICARAGUA</span></a>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>
      <nav class="main-nav" id="mainNav">
        <a href="index.html">Inicio</a>

        <a href="nosotros.html">Nosotros</a>
        <a href="contacto.html">Contacto</a>
      </nav>

  </header>

  <main class="section container">
    <h1>Catálogo de propiedades</h1>
    <p>Encuentra casas, apartamentos y lotes en las mejores zonas de Nicaragua.</p>

    <div class="filters">
      <label>
        Operación
        <select id="filterType">
          <option value="all">Todas</option>
          <option value="venta">Venta</option>
          <option value="alquiler">Alquiler</option>
        </select>
      </label>
      <label>
        Ciudad
        <select id="filterCity">
          <option value="all">Todas</option>
        </select>
      </label>
    </div>

    <div class="cards-grid" id="propertiesList"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 INMO NICARAGUA. Todos los derechos reservados.</p>
    </div>
